{% extends 'base.html' %}

{% block content %}
<div class="greeting-container" style="flex-direction: column;">
    <div style="background-color: #1e1f20; padding: 40px; border-radius: 28px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);">
        <h2 style="text-align: center; margin-bottom: 20px; font-weight: 500; color: #a8c7fa;">Recuperar Senha</h2>
        <p style="text-align: center; font-size: 0.85rem; color: #888; margin-bottom: 30px;">Digite seu e-mail Anagma para receber o link de redefinição.</p>
        
        <form method="post">
            {% csrf_token %}
            <div style="margin-bottom: 30px;">
                <label style="display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888;">E-mail</label>
                <input type="email" name="email" required style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #333; background: #131314; color: white; outline: none; box-sizing: border-box;">
            </div>
            
            <button type="submit" style="width: 100%; padding: 14px; border-radius: 28px; border: none; background: linear-gradient(to right, #4285f4, #9b72cb); color: white; font-weight: 600; cursor: pointer; transition: opacity 0.2s;">
                Enviar Link
            </button>
            
            <div style="text-align: center; margin-top: 20px; font-size: 0.9rem;">
                <a href="{% url 'login' %}" style="color: #888; text-decoration: none;">Voltar para o Login</a>
            </div>
        </form>
    </div>
</div>

<style>
    .sidebar { display: none !important; }
    .main-content { padding-bottom: 0 !important; }
    .prompt-container { display: none !important; }
</style>
{% endblock %}
