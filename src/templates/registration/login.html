{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card">
        <img id="digiana-logo"
             src="{% static 'dark.png' %}"
             data-dark="{% static 'dark.png' %}"
             data-light="{% static 'light.png' %}"
             alt="Digiana">
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Usuário</label>
                <input type="text" name="username" id="id_username" autocomplete="username" required>
            </div>

            <div class="form-group">
                <label for="id_password">Senha</label>
                <div class="password-wrapper">
                    <input type="password" name="password" id="id_password" autocomplete="current-password" required>
                    <button type="button" id="togglePassword" title="Mantenha pressionado para ver a senha">
                        👁️
                    </button>
                </div>
            </div>

            <div class="options-group">
                <input type="checkbox" name="remember_me" id="remember_me">
                <label for="remember_me">Lembrar-me</label>
            </div>
            
            <button type="submit" class="btn-login">
                Acessar Banco de Ideias
            </button>
            
            <div class="login-footer">
                <a href="{% url 'register' %}" class="link-secondary">Criar conta com E-mail Anagma</a>
                <a href="{% url 'password_reset' %}" class="link-muted">Esqueceu a senha?</a>
            </div>
            
            {% if form.errors %}
                <p class="error-msg">Usuário ou senha inválidos.</p>
            {% endif %}

            {% if messages %}
                {% for message in messages %}
                    <p class="msg-{{ message.tags }}">
                        {{ message }}
                    </p>
                {% endfor %}
            {% endif %}
        </form>
    </div>
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#id_password');

    const showPassword = () => {
        passwordField.type = 'text';
        togglePassword.classList.add('active');
    };

    const hidePassword = () => {
        passwordField.type = 'password';
        togglePassword.classList.remove('active');
    };

    // Eventos Mouse
    togglePassword.addEventListener('mousedown', (e) => { e.preventDefault(); showPassword(); });
    togglePassword.addEventListener('mouseup', hidePassword);
    togglePassword.addEventListener('mouseleave', hidePassword);

    // Eventos Touch
    togglePassword.addEventListener('touchstart', (e) => { e.preventDefault(); showPassword(); }, { passive: false });
    togglePassword.addEventListener('touchend', hidePassword);
    togglePassword.addEventListener('touchcancel', hidePassword);
</script>

<style>
    /* Ocultar elementos da interface principal */
    .sidebar { display: none !important; }
    .main-content { padding-bottom: 0 !important; }
    .prompt-container { display: none !important; }

    /* Layout Base */
    .login-wrapper {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 80vh;
    }

    .login-card {
        background-color: #1e1f20;
        padding: 40px;
        border-radius: 28px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    /* Logo Digiana */
    #digiana-logo {
        width: 100%;
        display: block;
        border-radius: 16px;
        margin-bottom: 24px;
        opacity: 0.88;
        transition: opacity 0.3s ease;
    }

    /* Formulário */
    .form-group { margin-bottom: 20px; }
    .form-group:last-of-type { margin-bottom: 30px; }

    label {
        display: block;
        margin-bottom: 8px;
        font-size: 0.9rem;
        color: #888;
    }

    input[type="text"],
    input[type="password"] {
        width: 100%;
        padding: 12px;
        border-radius: 12px;
        border: 1px solid #333;
        background: #131314;
        color: white;
        outline: none;
        box-sizing: border-box;
        font-family: inherit;
    }

    /* Password Toggle */
    .password-wrapper { position: relative; width: 100%; }
    .password-wrapper input { padding-right: 45px; }

    #togglePassword {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #666;
        cursor: pointer;
        font-size: 1.2rem;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
    }
    #togglePassword.active { color: #a8c7fa; }

    /* Opções e Botão */
    .options-group {
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    .options-group input { accent-color: #a8c7fa; width: 16px; height: 16px; }
    .options-group label { margin-bottom: 0; cursor: pointer; font-size: 0.85rem; }

    .btn-login {
        width: 100%;
        padding: 14px;
        border-radius: 28px;
        border: none;
        background: linear-gradient(to right, #4285f4, #9b72cb);
        color: white;
        font-weight: 600;
        cursor: pointer;
        transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }

    /* Footer do Login */
    .login-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 0.9rem;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    .link-secondary { color: #a8c7fa; text-decoration: none; }
    .link-muted { color: #888; text-decoration: none; }

    /* Mensagens */
    .error-msg, .msg-error { color: #d96570; font-size: 0.8rem; text-align: center; margin-top: 15px; }
    .msg-success { color: #81c995; font-size: 0.8rem; text-align: center; margin-top: 15px; }

    /* ════════════════════════════════════════
       LIGHT MODE OVERRIDES
       ════════════════════════════════════════ */
    html.light-mode .login-card {
        background-color: #ffffff;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.10);
    }
    html.light-mode #digiana-logo { opacity: 0.70; }
    html.light-mode label { color: #555; }
    html.light-mode input[type="text"],
    html.light-mode input[type="password"] {
        background: #f8f9fa;
        color: #1a1a1a;
        border-color: #e0e0e0;
    }
    html.light-mode .link-muted { color: #666; }
</style>
{% endblock %}
