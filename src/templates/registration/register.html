{% extends 'base.html' %}

{% block content %}
<div class="greeting-container" style="flex-direction: column; min-height: 100vh; padding: 20px 0; display: flex; align-items: center; justify-content: center;">
    <div class="form-card" style="max-width: 400px; padding: 30px;">
        <h2 class="form-title" style="text-align: center; margin-bottom: 8px;">Criar Conta Anagma IA</h2>
        <p class="form-subtitle" style="text-align: center; margin-bottom: 15px;">Apenas para e-mails corporativos @anagma.</p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 12px;">
                    <label class="form-label">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: #d96570; font-size: 0.75rem; margin-top: 2px;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" class="form-btn-primary" style="width: 100%; border-radius: 28px; margin-top: 10px;">
                Cadastrar
            </button>
            
            <div style="text-align: center; margin-top: 20px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 12px;">
                <a href="{% url 'login' %}" style="color: var(--accent-main); text-decoration: none; font-weight: 500;">Já tem uma conta? Faça login</a>
                <a href="{% url 'login' %}" class="form-btn-secondary" style="border-radius: 20px; padding: 8px; font-size: 0.85rem;">Voltar</a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Ocultar sidebar e ajustar layout para tela cheia de formulário */
    .sidebar { display: none !important; }
    .main-content { padding-bottom: 0 !important; width: 100% !important; margin-left: 0 !important; height: 100vh !important; }
    .prompt-container { display: none !important; }
    
    /* Garantir scroll se a altura da tela for extremamente reduzida */
    body { overflow-y: auto !important; height: auto !important; }
</style>
{% endblock %}
