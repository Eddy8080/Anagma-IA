{% extends 'base.html' %}

{% block content %}
<div class="greeting-container" style="flex-direction: column; min-height: 100vh; padding: 15px 0; display: flex; align-items: center; justify-content: center;">
    <div style="background-color: #1e1f20; padding: 20px 30px; border-radius: 28px; width: 90%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); margin: auto;">
        <h2 style="text-align: center; margin-bottom: 8px; font-weight: 500; color: #a8c7fa; font-size: 1.4rem;">Criar Conta Anagma IA</h2>
        <p style="text-align: center; font-size: 0.75rem; color: #888; margin-bottom: 15px;">Apenas para e-mails corporativos @anagma.</p>
        
        <form method="post">
            {% csrf_token %}
            {% for field in form %}
                <div style="margin-bottom: 12px;">
                    <label style="display: block; margin-bottom: 4px; font-size: 0.8rem; color: #888;">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}
                        <div style="color: #d96570; font-size: 0.75rem; margin-top: 2px;">{{ field.errors.0 }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            
            <button type="submit" style="width: 100%; padding: 10px; border-radius: 28px; border: none; background: linear-gradient(to right, #4285f4, #9b72cb); color: white; font-weight: 600; cursor: pointer; transition: opacity 0.2s; margin-top: 10px; font-size: 0.95rem;">
                Cadastrar
            </button>
            
            <div style="text-align: center; margin-top: 15px; font-size: 0.8rem; display: flex; flex-direction: column; gap: 10px;">
                <a href="{% url 'login' %}" style="color: #a8c7fa; text-decoration: none;">Já tem uma conta? Faça login</a>
                <a href="{% url 'login' %}" style="color: #888; text-decoration: none; border: 1px solid #333; padding: 8px; border-radius: 20px; transition: background 0.2s;" onmouseover="this.style.background='#2a2b2c'" onmouseout="this.style.background='transparent'">Voltar</a>
            </div>
        </form>
    </div>
</div>

<style>
    /* Estilizar inputs gerados pelo Django */
    input[type="text"], input[type="email"], input[type="password"] {
        width: 100%; padding: 8px 12px; border-radius: 12px; border: 1px solid #333; background: #131314; color: white; outline: none; box-sizing: border-box; font-size: 0.9rem;
    }
    input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
        border-color: #a8c7fa;
    }
    
    /* Ocultar sidebar e ajustar layout para tela cheia de formulário */
    .sidebar { display: none !important; }
    .main-content { padding-bottom: 0 !important; width: 100% !important; margin-left: 0 !important; height: 100vh !important; }
    .prompt-container { display: none !important; }
    
    /* Garantir scroll se a altura da tela for extremamente reduzida */
    body { overflow-y: auto !important; height: auto !important; }
</style>
{% endblock %}
