{% extends 'base.html' %}

{% block content %}
<div class="greeting-container" style="flex-direction: column;">
    <div style="background-color: #1e1f20; padding: 40px; border-radius: 28px; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center;">
        <h2 style="margin-bottom: 20px; font-weight: 500; color: #a8c7fa;">Link Enviado!</h2>
        <p style="font-size: 1rem; color: #e3e3e3; margin-bottom: 30px;">
            Enviamos as instruções de recuperação para o seu e-mail Anagma. Por favor, verifique sua caixa de entrada.
        </p>
        
        <a href="{% url 'login' %}" style="display: inline-block; width: 100%; padding: 14px; border-radius: 28px; text-decoration: none; background: #333537; color: white; font-weight: 600; cursor: pointer; transition: background 0.2s; box-sizing: border-box;">
            Voltar para o Login
        </a>
    </div>
</div>

<style>
    .sidebar { display: none !important; }
    .main-content { padding-bottom: 0 !important; }
    .prompt-container { display: none !important; }
</style>
{% endblock %}
